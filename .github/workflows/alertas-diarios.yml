name: Alertas Diários ImóvelPro

on:
  schedule:
    # Roda todo dia às 11:00 UTC (08:00 horário de Brasília)
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  verificar-vencimentos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install node-fetch

      - name: Verificar vencimentos e enviar e-mails
        run: node verificar-vencimentos.js
